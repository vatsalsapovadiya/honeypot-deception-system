<!DOCTYPE html>
<html>
<head>
    <title>SOC Login</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #020617;
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        /* 🌌 Animated background */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, #0ea5e9 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveBg 20s linear infinite;
            opacity: 0.1;
        }

        @keyframes moveBg {
            from { transform: translate(0, 0); }
            to { transform: translate(-200px, -200px); }
        }

        /* Center box */
        .container {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: rgba(15, 23, 42, 0.9);
            padding: 40px;
            border-radius: 15px;
            width: 320px;
            text-align: center;
            box-shadow: 0 0 25px rgba(14, 165, 233, 0.3);
            border: 1px solid rgba(14, 165, 233, 0.3);
        }

        .login-box h2 {
            margin-bottom: 10px;
            color: #38bdf8;
        }

        .subtitle {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: #020617;
            color: white;
            border: 1px solid #334155;
        }

        input:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 8px #38bdf8;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #0ea5e9, #22c55e);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #0ea5e9;
        }

        .error {
            color: #f87171;
            margin-bottom: 10px;
        }

        /* 🔐 Lock icon */
        .lock {
            font-size: 40px;
            margin-bottom: 10px;
        }

        /* Footer */
        .footer {
            margin-top: 20px;
            font-size: 11px;
            color: #64748b;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="login-box">

        <div class="lock">🔐</div>

        <h2>SOC Dashboard</h2>
        <div class="subtitle">Security Operations Center Access</div>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Access System</button>
        </form>

        <div class="footer">
            Authorized personnel only • Activity monitored
        </div>

    </div>
</div>

</body>
</html>
